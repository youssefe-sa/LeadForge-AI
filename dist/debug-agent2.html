<!DOCTYPE html>
<html>
<head>
    <title>Debug Agent 2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .step { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .info { background: #d1ecf1; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; max-height: 200px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Debug Agent 2 - Étape par Étape</h1>
    
    <div id="results"></div>
    <button onclick="runFullTest()">🚀 Lancer Test Complet</button>

    <script>
        const config = {
            serperKey: 'af8b9320ed32b401563d118ee8830e875fee80d3',
            groqKey: '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'
        };

        const results = document.getElementById('results');

        function addStep(title, status, data) {
            const div = document.createElement('div');
            div.className = `step ${status}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            results.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Simuler la fonction enrichWithSerper
        async function enrichWithSerper(apiKey, lead) {
            console.log('🔍 Enrichment query:', `${lead.name} ${lead.city || ''} ${lead.sector || ''}`.trim());
            
            const updates = {};
            
            // 1. Places search
            try {
                const placesResult = await fetch('https://google.serper.dev/places', {
                    method: 'POST',
                    headers: { 'X-API-KEY': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: `${lead.name} ${lead.city || ''} ${lead.sector || ''}`, gl: 'fr', hl: 'fr' }),
                });

                if (placesResult.ok) {
                    const places = await placesResult.json();
                    console.log('✅ Places result:', places);
                    
                    if (places.places && places.places.length > 0) {
                        const p = places.places[0];
                        if (!lead.address) updates.address = p.address || '';
                        if (!lead.phone) updates.phone = p.phoneNumber || p.phone || '';
                        if (!lead.website) updates.website = p.website || '';
                        if (!lead.googleRating) updates.googleRating = p.rating || 0;
                        if (!lead.googleReviews) updates.googleReviews = p.ratingCount || p.reviewCount || 0;
                        if (!lead.sector) updates.sector = p.category || p.type || '';
                        
                        const cid = p.cid || '';
                        if (cid) updates.serperCid = cid;
                        
                        const mapsLink = p.link || '';
                        if (!lead.googleMapsUrl) {
                            updates.googleMapsUrl = mapsLink || (cid ? `https://www.google.com/maps?cid=${cid}` : '');
                        }
                        
                        console.log('✅ Places updates:', updates);
                    }
                } else {
                    console.error('❌ Places failed:', placesResult.status);
                }
            } catch (error) {
                console.error('❌ Places exception:', error);
            }
            
            return updates;
        }

        // Simuler la fonction callLLM
        async function callLLM(config, prompt) {
            console.log('🧠 LLM prompt length:', prompt.length);
            
            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.groqKey}` },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 2048,
                    }),
                });
                
                if (res.ok) {
                    const data = await res.json();
                    const content = data.choices?.[0]?.message?.content;
                    console.log('✅ LLM response:', content);
                    return content || '';
                } else {
                    console.error('❌ LLM failed:', res.status);
                    return '';
                }
            } catch (error) {
                console.error('❌ LLM exception:', error);
                return '';
            }
        }

        // Test complet étape par étape
        async function runFullTest() {
            results.innerHTML = '<h2>🧪 Test Agent 2 en cours...</h2>';
            
            const testLead = {
                name: "Pro Dépannage - Plombier Paris 15",
                city: "Paris",
                sector: "Plomberie",
                email: "",
                phone: "",
                address: "",
                website: "",
                googleRating: 0,
                googleReviews: 0
            };

            addStep('📋 Lead de test', 'info', testLead);

            // Étape 1: Enrichment Serper
            addStep('🔍 Étape 1: Enrichment Serper', 'info', 'Démarrage...');
            try {
                const serperUpdates = await enrichWithSerper(config.serperKey, testLead);
                addStep('🔍 Étape 1: Enrichment Serper', 'success', {
                    status: 'Terminé',
                    updates: serperUpdates,
                    hasUpdates: Object.keys(serperUpdates).length > 0
                });
                
                // Fusionner les updates
                Object.assign(testLead, serperUpdates);
                addStep('📊 Lead après étape 1', 'info', testLead);
                
            } catch (error) {
                addStep('🔍 Étape 1: Enrichment Serper', 'error', { error: error.message });
            }

            // Étape 2: Test LLM
            addStep('🧠 Étape 2: Test LLM', 'info', 'Démarrage...');
            try {
                const llmPrompt = `Analyse cette entreprise et génère des informations précises.

ENTREPRISE: ${testLead.name}
SECTEUR: ${testLead.sector}
VILLE: ${testLead.city}
SITE: ${testLead.website}
NOTE: ${testLead.googleRating}

Retourne UNIQUEMENT ce JSON:
{
  "sector": "secteur exact",
  "description": "description professionnelle 2-3 phrases",
  "hours": "horaires si connus",
  "city": "ville si connue"
}`;

                const llmResponse = await callLLM(config, llmPrompt);
                addStep('🧠 Étape 2: Test LLM', 'success', {
                    status: 'Terminé',
                    responseLength: llmResponse.length,
                    response: llmResponse.substring(0, 200) + (llmResponse.length > 200 ? '...' : '')
                });
                
                // Parser la réponse JSON
                try {
                    const cleaned = llmResponse.replace(/```json?\n?/g, '').replace(/```/g, '').trim();
                    const aiData = JSON.parse(cleaned);
                    addStep('🧠 Étape 2: Parsing JSON', 'success', {
                        parsed: true,
                        data: aiData
                    });
                    
                    // Fusionner les updates
                    Object.assign(testLead, aiData);
                    
                } catch (parseError) {
                    addStep('🧠 Étape 2: Parsing JSON', 'error', { 
                        error: parseError.message,
                        rawResponse: llmResponse
                    });
                }
                
            } catch (error) {
                addStep('🧠 Étape 2: Test LLM', 'error', { error: error.message });
            }

            // Résultat final
            addStep('🏁 Résultat Final', 'info', {
                lead: testLead,
                score: calculateScore(testLead)
            });
            
            results.innerHTML += '<h2>✅ Test terminé !</h2>';
        }

        // Fonction de score simple
        function calculateScore(lead) {
            let score = 0;
            if (lead.name) score += 5;
            if (lead.email) score += 8;
            if (lead.phone) score += 5;
            if (lead.address) score += 3;
            if (lead.city) score += 3;
            if (lead.sector) score += 3;
            if (lead.description) score += 3;
            if (lead.website) score += 15;
            if (lead.googleRating >= 4) score += 10;
            if (lead.googleReviews >= 5) score += 10;
            return Math.min(score, 100);
        }
    </script>
</body>
</html>
