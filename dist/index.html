    \x3C!-- Contact Form Script -->
    <script>
        // Initialiser AOS
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });
        
        // Formulaire de contact
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Animation de confirmation
            const button = this.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>Message envoyé !';
            button.classList.add('btn-success');
            button.disabled = true;
            
            setTimeout(() => {
                alert('Merci pour votre message ! Nous vous contacterons rapidement.');
                this.reset();
                button.innerHTML = originalText;
                button.classList.remove('btn-success');
                button.disabled = false;
            }, 1500);
        });
        
        // Smooth scrolling avancé
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    const offsetTop = target.offsetTop - 100;
                    window.scrollTo({
                        top: offsetTop,
                        behavior: 'smooth'
                    });
                }
            });
        });
        
        // Navbar scroll effect avancé
        let lastScroll = 0;
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            const currentScroll = window.pageYOffset;
