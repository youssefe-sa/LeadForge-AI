name: Generate Sample Site

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate sample site
        run: npx tsx scripts/generate-sample.ts
      - name: Upload generated HTML
        uses: actions/upload-artifact@v4
        with:
          name: sample-site
          path: out/sample-site.html
