<!DOCTYPE html>
<html>
<head>
    <title>Test APIs LeadForge</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Test des APIs LeadForge</h1>
    
    <div id="results"></div>

    <script>
        const config = {
            serperKey: 'af8b9320ed32b401563d118ee8830e875fee80d3',
            groqKey: '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'
        };

        const results = document.getElementById('results');

        function addResult(title, success, data) {
            const div = document.createElement('div');
            div.className = `test ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <h3>${title}: ${success ? '✅ SUCCÈS' : '❌ ERREUR'}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            results.appendChild(div);
        }

        // Test 1: Serper API
        async function testSerper() {
            try {
                const response = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: { 
                        'X-API-KEY': config.serperKey, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        q: 'plombier paris 15', 
                        gl: 'fr', 
                        hl: 'fr' 
                    }),
                });

                const data = await response.json();
                addResult('🔍 Serper API', response.ok, {
                    status: response.status,
                    keys: Object.keys(data),
                    organicCount: data.organic?.length || 0,
                    hasPlaces: !!(data.places && data.places.length > 0)
                });
            } catch (error) {
                addResult('🔍 Serper API', false, { error: error.message });
            }
        }

        // Test 2: Groq API
        async function testGroq() {
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${config.groqKey}` 
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: 'Réponds: Capital de la France?' }
                        ],
                        temperature: 0.7,
                        max_tokens: 50,
                    }),
                });

                const data = await response.json();
                const content = data.choices?.[0]?.message?.content;
                addResult('🧠 Groq API', response.ok && content, {
                    status: response.status,
                    hasContent: !!content,
                    content: content,
                    usage: data.usage
                });
            } catch (error) {
                addResult('🧠 Groq API', false, { error: error.message });
            }
        }

        // Test 3: Test complet d'enrichissement
        async function testEnrichment() {
            try {
                // Simuler un lead
                const testLead = {
                    name: "Pro Dépannage - Plombier Paris 15",
                    city: "Paris",
                    sector: "Plomberie"
                };

                // Test Serper enrichment
                const serperResponse = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: { 
                        'X-API-KEY': config.serperKey, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        q: `${testLead.name} ${testLead.city} ${testLead.sector}`, 
                        gl: 'fr', 
                        hl: 'fr' 
                    }),
                });

                const serperData = await serperResponse.json();
                const hasData = serperData.organic?.length > 0 || serperData.places?.length > 0;

                addResult('🔍 Test Enrichissement Complet', hasData, {
                    lead: testLead,
                    serperStatus: serperResponse.status,
                    hasOrganic: !!(serperData.organic?.length > 0),
                    hasPlaces: !!(serperData.places?.length > 0),
                    organicCount: serperData.organic?.length || 0,
                    placesCount: serperData.places?.length || 0
                });

            } catch (error) {
                addResult('🔍 Test Enrichissement Complet', false, { error: error.message });
            }
        }

        // Lancer tous les tests
        async function runAllTests() {
            results.innerHTML = '<h2>🧪 Tests en cours...</h2>';
            
            await testSerper();
            await new Promise(r => setTimeout(r, 1000));
            
            await testGroq();
            await new Promise(r => setTimeout(r, 1000));
            
            await testEnrichment();
            
            results.innerHTML += '<h2>✅ Tests terminés !</h2>';
        }

        // Démarrer les tests automatiquement
        runAllTests();
    </script>
</body>
</html>
