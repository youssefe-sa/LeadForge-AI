<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plomberie Pro - plomberie à Paris</title>
    <style>
        :root {
            --primary: #0f766e;
            --secondary: #115e59;
            --accent: #14b8a6;
            --background: #f0fdfa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .hero p {
            color: var(--secondary);
            font-size: 1.2rem;
        }
        .contact {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 30px;
        }
        .contact a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Plomberie Pro</h1>
            <p>Plomberie professionnel à Paris</p>
        </div>
        
        <div class="contact">
            <h2>Contactez-nous</h2>
            <p>📞 +33612345678</p>
            <p>✉️ test@plomberie.fr</p>
            <p>📍 Paris</p>
            <a href="tel:+33612345678">Appeler maintenant</a>
        </div>
    </div>
</body>
</html>
