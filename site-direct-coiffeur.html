<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Coiffure - Salon de Coiffure à Lyon</title>
    <style>
        :root { --primary: #ec4899; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; text-align: center; }
        .hero { background: var(--primary); color: white; padding: 60px 20px; text-align: center; }
        .cta { background: white; color: var(--primary); padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .content { background: white; padding: 40px 20px; margin: 20px 0; border-radius: 10px; }
        .contact { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .contact-item { background: #f9f9f9; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Salon Coiffure</h1>
            <p>Salon de Coiffure à Lyon</p>
        </div>
    </header>
    
    <section class="hero">
        <div class="container">
            <h2>Salon de Coiffure</h2>
            <p>Service professionnel et de qualité</p>
            <a href="tel:+33623456789" class="cta">Contacter maintenant</a>
        </div>
    </section>
    
    <section class="content">
        <div class="container">
            <h3>Contact</h3>
            <div class="contact">
                <div class="contact-item">
                    <h4>Téléphone</h4>
                    <a href="tel:+33623456789">+33623456789</a>
                </div>
                <div class="contact-item">
                    <h4>Email</h4>
                    <a href="mailto:contact@coiffeur.fr">contact@coiffeur.fr</a>
                </div>
                <div class="contact-item">
                    <h4>Ville</h4>
                    <p>Lyon</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
